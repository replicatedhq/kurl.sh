name: deploy

on:
  push:
    branches:
      - main

jobs:

  deploy-staging-netlify:
    environment:
      name: staging
      url: https://staging.kurl.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - name: dependencies
        run: make deps
      - name: playwright
        run: npx playwright install --with-deps
      - name: build
        run: make build-staging

      - name: install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: deploy to Netlify
        run: |
          netlify deploy \
            --prod \
            --dir=public \
            --site="$NETLIFY_SITE_ID" \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --message="Deploy staging.kurl.sh from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: 9cc8b96a-2c23-4f71-bb0f-cbdc19ccbf76
        timeout-minutes: 5

  deploy-production-netlify:
    environment:
      name: production
      url: https://kurl.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - name: dependencies
        run: make deps
      - name: playwright
        run: npx playwright install --with-deps
      - name: build
        run: make build-production

      - name: install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: deploy to Netlify
        run: |
          netlify deploy \
            --prod \
            --dir=public \
            --site="$NETLIFY_SITE_ID" \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --message="Deploy kurl.sh from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: 7e8d8070-273a-45a3-9c84-885a52d8ab69
        timeout-minutes: 5
