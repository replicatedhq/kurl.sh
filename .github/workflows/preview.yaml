name: preview

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write

jobs:

  deploy-staging-netlify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn
      - name: dependencies
        run: make deps
      - name: playwright
        run: npx playwright install --with-deps
      - name: build
        run: make build-staging

      - name: install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: deploy to Netlify
        id: netlify
        run: |
          OUTPUT=$(netlify deploy \
            --dir=public \
            --site="$NETLIFY_SITE_ID" \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --message="Deploy preview staging.kurl.sh from GitHub Actions" \
            --json)
          URL=$(node -pe "JSON.parse(process.argv[1]).deploy_url" "$OUTPUT")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: 9cc8b96a-2c23-4f71-bb0f-cbdc19ccbf76
        timeout-minutes: 5

      - name: comment preview URL on PR
        run: gh pr comment "${{ github.event.pull_request.number }}" --body "Preview deployed: ${{ steps.netlify.outputs.url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
